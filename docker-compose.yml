services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: estimatepro
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/estimatepro?sslmode=disable
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: estimatepro
      S3_USE_SSL: "false"
      JWT_SECRET: your-secret-key-change-in-production
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 720h
      SERVER_PORT: "${SERVER_PORT:-8080}"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-http://localhost:3000}
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      COMPOSIO_GMAIL_ACCOUNT_ID: ${COMPOSIO_GMAIL_ACCOUNT_ID:-}
      COMPOSIO_TELEGRAM_ACCOUNT_ID: ${COMPOSIO_TELEGRAM_ACCOUNT_ID:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LLM_BASE_URL: ${LLM_BASE_URL}
    depends_on:
      - postgres
      - redis
      - minio


  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8080}"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
